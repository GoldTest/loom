name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: crates/gui/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: crates/gui/frontend

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2

      - name: Build CLI and GUI
        run: cargo build --release --workspace

      - name: Bundle Tauri GUI App (NSIS Installer)
        run: npx @tauri-apps/cli build
        working-directory: crates/gui/src-tauri
        # This compiles the app and packages it using the NSIS bundler configured in tauri.conf.json

      - name: Create Portable ZIP Package
        shell: pwsh
        run: |
          # Create a ZIP file containing the standalone GUI, CLI executables, and the project README.
          Compress-Archive -Path target/release/CliMaster.exe, target/release/climaster.exe, README.md -DestinationPath target/release/CliMaster-portable-x64.zip

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/nsis/*.exe
            target/release/CliMaster-portable-x64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
